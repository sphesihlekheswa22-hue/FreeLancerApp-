    <title>Campus Gigs — Student Freelance Marketplace</title>

    <meta name="author" content="Campus Gigs" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Campus Gigs — Student Freelance Marketplace" />
    <meta property="og:description" content="Connect with talented students for freelance gigs and job opportunities." />
    <meta property="og:site_name" content="Campus Gigs" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Campus Gigs" />
    <meta name="twitter:description" content="The campus marketplace for skills and services." />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Campus Gigs" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
    
    <!-- Critical CSS inline for fast first paint -->
    <style>
      /* Critical rendering path styles */
      html { background: #ffffff; }
      @media (prefers-color-scheme: dark) { html { background: #0f172a; } }
      
      #root {
        opacity: 0;
        animation: appFadeIn 0.3s ease-out 0.1s forwards;
      }
      
      @keyframes appFadeIn {
        to { opacity: 1; }
      }
      
      /* Loading spinner while JS loads */
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        background: #ffffff;
        transition: opacity 0.3s ease-out;
      }
      
      @media (prefers-color-scheme: dark) {
        .initial-loader { background: #0f172a; }
      }
      
      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .initial-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .initial-loader-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
      }
      
      @media (prefers-color-scheme: dark) {
        .initial-loader-text { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <!-- Initial loading state -->
    <div class="initial-loader" id="initial-loader">
      <div class="initial-loader-spinner"></div>
      <div class="initial-loader-text">Loading Campus Gigs...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Hide loader once app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function() { loader.remove(); }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>"""
